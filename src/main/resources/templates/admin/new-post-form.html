<!DOCTYPE html>
<html lang="ko" layout:decorate="layout/admin-layout"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <title>게시글 작성</title>
  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <!-- EasyMDE -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <style layout:fragment="styles">
    /* EasyMDE 다크모드 지원 */
    [data-theme="dark"] .EasyMDEContainer .CodeMirror {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-toolbar {
      background-color: var(--bg-primary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-toolbar button {
      color: var(--text-primary);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-toolbar button:hover {
      background-color: var(--bg-secondary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-statusbar {
      background-color: var(--bg-primary);
      color: var(--text-secondary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .CodeMirror-cursor {
      border-left-color: var(--text-primary);
    }

    /* 태그 입력 */
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-secondary);
      min-height: 45px;
      transition: all 0.2s;
    }

    .tags-container:focus-within {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    [data-theme="dark"] .tags-container:focus-within {
      box-shadow: 0 0 0 3px rgba(91, 159, 255, 0.1);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background-color: var(--color-primary);
      color: white;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .tag-remove {
      cursor: pointer;
      font-size: 14px;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .tag-remove:hover {
      opacity: 1;
    }

    .tag-input {
      flex: 1;
      min-width: 150px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      padding: 4px;
    }

    .tag-input:focus {
      outline: none;
    }

    /* 상태바 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-bar-left {
      display: flex;
      gap: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icon {
      font-size: 12px;
    }

    .status-icon.saving {
      color: var(--color-warning);
    }

    .status-icon.saved {
      color: var(--color-success);
    }

    /* 라디오 버튼 그룹 */
    .radio-group {
      display: flex;
      gap: 16px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-primary);
    }

    .radio-label input[type="radio"] {
      cursor: pointer;
      accent-color: var(--color-primary);
    }

    /* 액션 버튼 */
    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
<!-- Main Content -->
<main class="main-content" layout:fragment="content">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">게시글 작성</h1>
      <p class="page-subtitle">새로운 게시글을 작성하거나 기존 게시글을 수정합니다</p>
    </div>
  </div>

  <!-- Editor Form -->
  <div class="card">
    <div class="card-body">
      <form id="postForm">
        <!-- 제목 -->
        <div class="form-group">
          <label class="form-label">제목 *</label>
          <input
              type="text"
              class="form-input"
              id="postTitle"
              placeholder="게시글 제목을 입력하세요"
              required
          >
        </div>

        <!-- 카테고리 -->
        <div class="form-group">
          <label class="form-label">카테고리 *</label>
          <select class="form-select" id="postCategory" required>
            <option value="">카테고리를 선택하세요</option>
            <option value="spring">Spring</option>
            <option value="java">Java</option>
            <option value="database">Database</option>
            <option value="devops">DevOps</option>
          </select>
        </div>

        <!-- Slug -->
        <div class="form-group">
          <label class="form-label">
            Slug (URL) *
            <span style="font-size: 12px; color: var(--text-secondary); font-weight: normal;">
                                    - 영문, 숫자, 하이픈만 사용 (예: spring-security-jwt)
                                </span>
          </label>
          <input
              type="text"
              class="form-input"
              id="postSlug"
              placeholder="spring-security-jwt-authentication"
              maxlength="250"
              pattern="[a-z0-9-]+"
              required
          >
          <div style="display: flex; justify-content: space-between; margin-top: 4px;">
            <small style="color: var(--text-secondary); font-size: 12px;">
              영문 소문자, 숫자, 하이픈(-)만 입력 가능
            </small>
            <small style="color: var(--text-secondary); font-size: 12px;">
              <span id="slugCount">0</span> / 250자
            </small>
          </div>
        </div>

        <!-- 태그 -->
        <div class="form-group">
          <label class="form-label">태그</label>
          <div class="tags-container" id="tagsContainer">
            <input
                type="text"
                class="tag-input"
                id="tagInput"
                placeholder="태그를 입력하고 Enter 또는 쉼표를 입력하세요"
            >
          </div>
        </div>

        <!-- 요약 -->
        <div class="form-group">
          <label class="form-label">
            요약 *
            <span style="font-size: 12px; color: var(--text-secondary); font-weight: normal;">
                                    - 검색 결과 및 카드에 표시됩니다
                                </span>
          </label>
          <textarea
              class="form-textarea"
              id="postSummary"
              placeholder="게시글 요약을 입력하세요 (최대 500자)"
              maxlength="500"
              rows="3"
              required
          ></textarea>
          <div style="text-align: right; margin-top: 4px;">
            <small style="color: var(--text-secondary); font-size: 12px;">
              <span id="summaryCount">0</span> / 500자
            </small>
          </div>
        </div>

        <!-- 마크다운 에디터 -->
        <div class="form-group">
          <label class="form-label">내용 *</label>
          <textarea id="markdownEditor"></textarea>
        </div>

        <!-- 게시 상태 -->
        <div class="form-group">
          <label class="form-label">게시 상태</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="status" value="published" checked>
              <span>게시</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="status" value="draft">
              <span>임시저장</span>
            </label>
          </div>
        </div>

        <!-- 상태바 -->
        <div class="status-bar" style="margin-bottom: 24px;">
          <div class="status-bar-left">
            <div class="status-item">
              <span class="status-icon" id="saveIcon">💾</span>
              <span id="saveStatus">저장됨</span>
            </div>
            <div class="status-item">
              <span class="status-icon">📄</span>
              <span id="lineCount">0줄</span>
            </div>
            <div class="status-item">
              <span class="status-icon">📝</span>
              <span id="wordCount">0자</span>
            </div>
          </div>
        </div>

        <!-- 액션 버튼 -->
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">취소</button>
          <button type="submit" class="btn btn-primary">게시하기</button>
        </div>
      </form>
    </div>
  </div>
</main>
<th:block layout:fragment="scripts">
  <!-- EasyMDE -->
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <!-- 페이지 JavaScript -->
  <script>
    let easyMDE;
    let tags = [];
    let autoSaveTimer;

    document.addEventListener('DOMContentLoaded', () => {
      // EasyMDE 초기화
      easyMDE = new EasyMDE({
        element: document.getElementById('markdownEditor'),
        autoDownloadFontAwesome: false,
        spellChecker: false,
        indentWithTabs: true,
        placeholder: '마크다운으로 내용을 작성하세요...',
        status: false,
        toolbar: [
          'bold', 'italic', 'heading', '|',
          'quote', 'unordered-list', 'ordered-list', '|',
          'link', 'image', 'table', '|',
          'preview', 'side-by-side', 'fullscreen', '|',
          'guide'
        ]
      });

      // 에디터 변경 시 통계 업데이트 및 자동저장
      easyMDE.codemirror.on('change', () => {
        updateStats();
        scheduleAutoSave();
      });

      // Slug 글자 수 카운터
      const slugInput = document.getElementById('postSlug');
      const slugCount = document.getElementById('slugCount');

      slugInput.addEventListener('input', (e) => {
        // 영문 소문자, 숫자, 하이픈만 허용
        e.target.value = e.target.value
        .toLowerCase()
        .replace(/[^a-z0-9-]/g, '')
        .replace(/--+/g, '-'); // 연속된 하이픈 제거

        slugCount.textContent = e.target.value.length;

        // 250자 초과 시 색상 변경
        if (e.target.value.length >= 250) {
          slugCount.style.color = 'var(--color-danger)';
        } else {
          slugCount.style.color = 'var(--text-secondary)';
        }
      });

      // Summary 글자 수 카운터
      const summaryInput = document.getElementById('postSummary');
      const summaryCount = document.getElementById('summaryCount');

      summaryInput.addEventListener('input', (e) => {
        summaryCount.textContent = e.target.value.length;

        // 500자 초과 시 색상 변경
        if (e.target.value.length >= 500) {
          summaryCount.style.color = 'var(--color-danger)';
        } else {
          summaryCount.style.color = 'var(--text-secondary)';
        }
      });

      // 제목에서 Slug 자동 생성 (Slug가 비어있을 때만)
      const titleInput = document.getElementById('postTitle');

      titleInput.addEventListener('blur', () => {
        if (!slugInput.value && titleInput.value) {
          const autoSlug = generateSlug(titleInput.value);
          slugInput.value = autoSlug;
          slugCount.textContent = autoSlug.length;
        }
      });

      // 태그 입력 처리
      const tagInput = document.getElementById('tagInput');
      const tagsContainer = document.getElementById('tagsContainer');

      tagInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          addTag();
        } else if (e.key === 'Backspace' && tagInput.value === '' && tags.length > 0) {
          removeTag(tags.length - 1);
        }
      });

      // 폼 제출
      document.getElementById('postForm').addEventListener('submit', (e) => {
        e.preventDefault();
        savePost();
      });

      // 취소 버튼
      document.getElementById('cancelBtn').addEventListener('click', () => {
        if (confirm('작성 중인 내용이 저장되지 않을 수 있습니다. 정말 취소하시겠습니까?')) {
          window.location.href = 'admin-posts-list.html';
        }
      });
    });

    // Slug 자동 생성 함수
    function generateSlug(title) {
      return title
      .toLowerCase()
      .trim()
      // 한글을 영어로 변환 (간단한 로마자 변환)
      .replace(/[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/g, (char) => {
        // 실제로는 서버에서 더 정교한 변환 필요
        return '';
      })
      .replace(/[^a-z0-9\s-]/g, '') // 특수문자 제거
      .replace(/\s+/g, '-') // 공백을 하이픈으로
      .replace(/-+/g, '-') // 연속된 하이픈 제거
      .replace(/^-|-$/g, '') // 앞뒤 하이픈 제거
      .substring(0, 250); // 250자 제한
    }

    // 통계 업데이트
    function updateStats() {
      const content = easyMDE.value();
      const lines = content.split('\n').length;
      const chars = content.length;

      document.getElementById('lineCount').textContent = `${lines}줄`;
      document.getElementById('wordCount').textContent = `${chars}자`;
    }

    // 자동저장 예약
    function scheduleAutoSave() {
      const saveIcon = document.getElementById('saveIcon');
      const saveStatus = document.getElementById('saveStatus');

      saveIcon.className = 'status-icon saving';
      saveStatus.textContent = '저장 중...';

      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        autoSave();
      }, 3000);
    }

    // 자동저장
    function autoSave() {
      const data = {
        title: document.getElementById('postTitle').value,
        slug: document.getElementById('postSlug').value,
        summary: document.getElementById('postSummary').value,
        category: document.getElementById('postCategory').value,
        tags: tags,
        content: easyMDE.value(),
        status: document.querySelector('input[name="status"]:checked').value
      };

      localStorage.setItem('blog-post-draft', JSON.stringify(data));

      const saveIcon = document.getElementById('saveIcon');
      const saveStatus = document.getElementById('saveStatus');
      saveIcon.className = 'status-icon saved';
      saveStatus.textContent = '저장됨';
    }

    // 태그 추가
    function addTag() {
      const tagInput = document.getElementById('tagInput');
      const value = tagInput.value.trim().replace(/,/g, '');

      if (value && !tags.includes(value)) {
        tags.push(value);
        renderTags();
        tagInput.value = '';
      }
    }

    // 태그 제거
    function removeTag(index) {
      tags.splice(index, 1);
      renderTags();
    }

    // 태그 렌더링
    function renderTags() {
      const tagsContainer = document.getElementById('tagsContainer');
      const tagInput = document.getElementById('tagInput');

      const tagElements = tags.map((tag, index) => `
                <span class="tag">
                    ${tag}
                    <span class="tag-remove" onclick="removeTag(${index})">×</span>
                </span>
            `).join('');

      tagsContainer.innerHTML = tagElements;
      tagsContainer.appendChild(tagInput);
    }

    // 게시글 저장
    function savePost() {
      const title = document.getElementById('postTitle').value;
      const slug = document.getElementById('postSlug').value;
      const summary = document.getElementById('postSummary').value;
      const category = document.getElementById('postCategory').value;
      const content = easyMDE.value();
      const status = document.querySelector('input[name="status"]:checked').value;

      // 유효성 검사
      if (!title || !slug || !summary || !category || !content) {
        alert('필수 항목을 모두 입력해주세요.');
        return;
      }

      // Slug 유효성 검사
      if (!/^[a-z0-9-]+$/.test(slug)) {
        alert('Slug는 영문 소문자, 숫자, 하이픈(-)만 사용할 수 있습니다.');
        return;
      }

      if (slug.length > 250) {
        alert('Slug는 250자를 초과할 수 없습니다.');
        return;
      }

      if (summary.length > 500) {
        alert('요약은 500자를 초과할 수 없습니다.');
        return;
      }

      const data = {
        title,
        slug,
        summary,
        category,
        tags,
        content,
        status
      };

      console.log('게시글 저장:', data);
      alert('게시글이 저장되었습니다.');

      // 저장 후 목록으로 이동
      // window.location.href = 'admin-posts-list.html';
    }

    // Window에 함수 노출
    window.removeTag = removeTag;
  </script>
</th:block>
</body>
</html>
