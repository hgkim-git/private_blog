spring:
  application:
    name: private-blog
  profiles:
    default: local
    active: ${SPRING_PROFILE:local}
  jpa:
    open-in-view: false
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
  sql:
    init:
      mode: never
  cache:
    type: simple
  ai:
    retry:
      max-attempts: 2
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-3.1-flash-lite
            temperature: 0.3
    # Ollama 프로바이더 교체 시 아래 주석을 해제하고 위 google.genai 블록을 제거한다.
