spring:
  jpa:
    hibernate:
      # validate: 엔티티와 테이블이 정상 매핑되었는지만 확인 (운영 환경 권장)
      # update: 엔티티 변경사항을 자동 반영 (개발 환경에서만 사용)
      # create: 시작 시 테이블 삭제 후 재생성 (위험, 테스트용)
      # none: 아무것도 하지 않음
      ddl-auto: create

logging:
  level:
    root: INFO
    io.github.hgkimer.privateblog: DEBUG
    p6spy: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(%-5level) %clr([%15.15thread]){cyan} %clr(%-40.40logger{39}){blue} - %msg%n"