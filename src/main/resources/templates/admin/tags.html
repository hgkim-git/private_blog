<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layout/admin-layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <title>태그 관리</title>
  <style>
    /* 페이지 고유 스타일 */
    .tag-container {
      max-width: 800px;
    }

    .form-row-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .edit-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .slug-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
  </style>
</head>
<body>
<!-- Main Content -->
<main class="main-content" layout:fragment="content">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">태그 관리</h1>
      <p class="page-subtitle">게시글에 사용할 태그를 관리합니다</p>
    </div>
  </div>

  <!-- Tag Management -->
  <div class="tag-container">
    <div class="section-card">
      <div class="section-header">
        <div>
          <span class="section-title">태그</span>
          <span class="section-count" id="tagCount"
                th:text="'(' + ${#lists.size(tags)} + '개)'">(0개)</span>
        </div>
      </div>

      <!-- Add Form -->
      <div class="add-form">
        <form id="addTagForm">
          <div class="form-row-2col">
            <div>
              <input
                  aria-label="새로운 태그 이름 입력"
                  class="form-input"
                  id="newTagName"
                  placeholder="태그 이름 (예: Spring Security)"
                  required
                  type="text"
              >
            </div>
            <div>
              <input
                  aria-label="새로운 Slug 입력"
                  class="form-input slug-input"
                  id="newTagSlug"
                  maxlength="50"
                  placeholder="Slug (예: spring-security)"
                  required
                  type="text"
              >
              <div class="slug-hint">영문 소문자, 숫자, 하이픈만 입력 가능</div>
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top: 12px;" type="submit">추가</button>
        </form>
      </div>

      <!-- Items List -->
      <div class="items-list" id="tagList">
        <div class="item" th:data-id="${tag.id}" th:each="tag : ${tags}">
          <div class="item-info">
            <div class="item-name" th:text="${tag.name}">태그명</div>
            <div class="item-meta">
              <span th:text="'Slug: ' + ${tag.slug}">Slug: slug</span>
              <span style="margin-left: 12px;"
                    th:text="'게시글 ' + ${tag.postCount} + '개'">게시글 0개</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit tag-action">수정</button>
            <button class="action-btn delete tag-action">삭제</button>
          </div>
          <div class="edit-form" style="display: none;">
            <input aria-label="태그 이름 입력"
                   class="edit-input"
                   th:data-pv="${tag.name}" th:id="'edit-name-' + ${tag.id}"
                   th:value="${tag.name}"
                   type="text">
            <input aria-label="태그 Slug 입력"
                   class="edit-input slug-input"
                   th:data-pv="${tag.slug}" th:id="'edit-slug-' + ${tag.id}"
                   th:value="${tag.slug}"
                   type="text">
            <button class="btn btn-success save tag-action">저장</button>
            <button class="btn btn-cancel cancel tag-action">취소</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<!-- 페이지 JavaScript -->
<th:block layout:fragment="scripts">
  <script th:src="@{/js/admin/tags.js}" type="module"></script>
</th:block>
</body>
</html>
