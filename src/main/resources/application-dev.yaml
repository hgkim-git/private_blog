spring:
  datasource:
    #    url: ${TEST_DB_URL}
    #    username: ${TEST_DB_USER}
    #    password: ${TEST_DB_PASSWORD}
    # Syntax error가 보이면 build.gradle에 dependency 추가
    #    driver-class-name: org.h2.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # validate: 엔티티와 테이블이 정상 매핑되었는지만 확인 (운영 환경 권장)
      # update: 엔티티 변경사항을 자동 반영 (개발 환경에서만 사용)
      # create: 시작 시 테이블 삭제 후 재생성 (위험, 테스트용)
      # none: 아무것도 하지 않음
      ddl-auto: update
  thymeleaf:
    cache: false
    prefix: file:src/main/resources/templates/
  web:
    resources:
      static-locations: file:src/main/resources/static/

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000} # (ms)
  cookie-name: ${JWT_COOKIE_NAME:access-token}
  use-secure-cookie: false # http: false / https: true

logging:
  level:
    root: INFO
    io.github.hgkimer.privateblog: DEBUG
    p6spy: INFO
    org.springframework.security: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(%-5level) %clr([%15.15thread]){cyan} %clr(%-40.40logger{39}){blue} - %msg%n"