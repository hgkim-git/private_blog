spring:
  datasource:
    url: ${TEST_DB_URL}
    username: ${TEST_DB_USER}
    password: ${TEST_DB_PASSWORD}
    # Syntax error가 보이면 build.gradle에 dependency 추가
    driver-class-name: org.h2.Driver
  jpa:
    # SQL 출력 설정 (개발 시 유용)
    show-sql: true
    hibernate:
      # validate: 엔티티와 테이블이 정상 매핑되었는지만 확인 (운영 환경 권장)
      # update: 엔티티 변경사항을 자동 반영 (개발 환경에서만 사용)
      # create: 시작 시 테이블 삭제 후 재생성 (위험, 테스트용)
      # none: 아무것도 하지 않음
      ddl-auto: create
    properties:
      hibernate:
        # SQL 포맷팅 (가독성 향상)
        format_sql: true
        # SQL 주석 출력 (어떤 엔티티에서 발생한 쿼리인지 표시)
        use_sql_comments: true
        # Hibernate 6 부터 런타임에 자동 감지하여 적절한 Dialect 선택
        # 버전이 명시된 Dialect들 deprecated
        # 반드시 필요한 경우(사용자 정의 Dialect, 타사 Dialect 사용 필요 등) 아니면 설정 X
        # dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    root: info
    # org.hibernate.type.descriptor.sql.BasicBinder: trace (Hibernate 5 이하)
    org.hibernate.orm.jdbc.bind: trace