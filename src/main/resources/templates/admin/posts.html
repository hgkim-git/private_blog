<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layout/admin-layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <title>게시글 관리</title>
  <style layout:fragment="styles">
    /* 페이지 고유 스타일 */
    .post-title-cell {
      max-width: 400px;
    }

    .post-title-link {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .post-title-link:hover {
      color: var(--color-primary);
    }
  </style>
</head>
<body>
<!-- Main Content -->
<main class="main-content" layout:fragment="content">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">게시글 관리</h1>
      <p class="page-subtitle">전체 게시글을 관리하고 수정할 수 있습니다</p>
    </div>
    <div class="page-actions">
      <a class="btn btn-primary" th:href="@{/admin/posts/form}">
        <span>✏️</span>
        <span>새 게시글 작성</span>
      </a>
    </div>
  </div>

  <!-- Filters Section -->
  <div class="filters-section">
    <div class="filters-grid">
      <div class="filter-group">
        <label class="filter-label" for="categoryFilter">카테고리</label>
        <select class="filter-select" id="categoryFilter">
          <option value="">전체</option>
          <option th:each="category : ${categories}" th:text="${category.name}"
                  th:value="${category.slug}">Spring
          </option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="statusFilter">상태</label>
        <select class="filter-select" id="statusFilter">
          <option value="">전체</option>
          <option value="published">게시</option>
          <option value="draft">임시 저장</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="searchInput">검색</label>
        <div class="filter-search-group">
          <input
              autofocus
              class="filter-input"
              id="searchInput"
              placeholder="제목 또는 내용으로 검색..."
              type="text"
          >
          <button class="btn btn-primary" id="searchBtn" type="button">검색</button>
        </div>
      </div>
      <div class="filter-group">
        <label aria-hidden="true" class="filter-label" style="opacity: 0;">버튼</label>
        <button class="btn btn-secondary" id="resetBtn">초기화</button>
      </div>
    </div>
  </div>

  <!-- Posts Table -->
  <div class="table-container">
    <div class="table-header">
      <div>
        <span class="table-title">게시글 목록</span>
        <span class="table-count" id="postCount"
              th:text="'(' + ${page.totalElements} + '개)'">(28개)</span>
      </div>
      <div class="bulk-actions">
        <span class="table-count" id="selectedCount"></span>
        <button class="btn btn-danger" id="bulkDeleteBtn" style="display: none;">
          선택 삭제
        </button>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="table">
        <thead>
        <tr>
          <th class="checkbox-col">
            <input aria-label="전체 선택" class="checkbox" id="selectAll" type="checkbox">
          </th>
          <th>제목</th>
          <th>카테고리</th>
          <th>상태</th>
          <th>조회수</th>
          <th>작성일</th>
          <th class="actions-col">작업</th>
        </tr>
        </thead>
        <tbody id="postsTableBody">
        <tr th:data-id="${post.id}" th:each="post : ${posts}">
          <td style="text-align: center;">
            <input aria-label="개별 선택" class="checkbox row-checkbox" type="checkbox">
          </td>
          <td class="post-title-cell">
            <a class="post-title-link" href="#" th:text="${post.title}">Spring Security와 JWT를 활용한 인증
              시스템 구현</a>
          </td>
          <td th:text="${post.category == null ? '' : post.category.name}">Spring</td>
          <td th:switch="${post.status}">
            <span class="status-badge published" th:case="'PUBLISHED'">게시</span>
            <span class="status-badge draft" th:case="'DRAFT'">임시 저장</span>
          </td>
          <td th:text="${post.viewCount}">0</td>
          <td th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}">2024.01.15</td>
          <td>
            <div class="actions-cell">
              <button class="action-btn">수정</button>
              <button class="action-btn delete">삭제</button>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" th:unless="${#lists.isEmpty(posts)}">
      <a class="page-btn"
         th:href="${baseURL + 'page=0'}">처음</a>
      <a class="page-btn"
         th:href="${baseURL + 'page=' + (page.number - 1)}"
         th:if="${page.hasPrevious()}">이전</a>
      <a class="page-btn"
         th:classappend="${i == page.number} ? 'active'"
         th:each="i : ${#numbers.sequence(startPage, endPage)}"
         th:href="${baseURL + 'page=' + i}"
         th:text="${i + 1}">1</a>
      <a class="page-btn"
         th:href="${baseURL + 'page=' + (page.number + 1)}"
         th:if="${page.hasNext()}">다음</a>
      <a class="page-btn"
         th:href="${baseURL + 'page=' + (page.totalPages - 1)}">마지막</a>
    </div>
  </div>
</main>

<!-- 페이지 JavaScript -->
<th:block layout:fragment="scripts">
  <script th:src="@{/js/admin/posts.js}" type="module"></script>
</th:block>
</body>
</html>
