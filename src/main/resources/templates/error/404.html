<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>404 - 페이지를 찾을 수 없습니다</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/error-pages.css}">
  <link rel="icon" th:href="@{/img/favicon.ico}">
  <style>
    .error-code {
      color: #667eea; /* 폴백 색상 */
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-emoji {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>
<body>
<div class="error-container">
  <div class="error-content">
    <div class="error-emoji">🔍</div>
    <div class="error-code">404</div>
    <h1 class="error-title">페이지를 찾을 수 없습니다</h1>
    <p class="error-description">
      요청하신 페이지가 존재하지 않거나 이동했을 수 있습니다.<br>
      URL을 다시 확인해주시거나 아래 버튼을 통해 다른 페이지로 이동해주세요.
    </p>

    <div class="error-actions">
      <a class="btn btn-primary" th:href="@{/}">
        🏠 홈으로 돌아가기
      </a>
      <button class="btn btn-secondary" onclick="history.back()">
        ← 이전 페이지
      </button>
    </div>
  </div>
</div>

<script>
  // 다크 모드 초기화
  const isDarkMode = localStorage.getItem('darkMode') === 'true' ||
      (!localStorage.getItem('darkMode') && window.matchMedia(
          '(prefers-color-scheme: dark)').matches);

  if (isDarkMode) {
    document.documentElement.classList.add('dark');
  }
</script>
</body>
</html>
