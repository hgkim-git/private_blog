<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layout/admin-layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>대시보드</title>
</head>
<body>
<main class="main-content" layout:fragment="content">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">대시보드</h1>
      <p class="page-subtitle">블로그 통계와 트래픽 현황을 확인하세요</p>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-header">
        <div>
          <div class="stat-label">전체 게시글</div>
          <div class="stat-value" th:text="${stats.totalPostCount}">0</div>
          <div class="stat-change"
               th:text="${stats.publishedPostCount} + '개 게시 / ' + ${stats.draftPostCount} + '개 임시저장'">
            -
          </div>
        </div>
        <div class="stat-icon">📝</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-header">
        <div>
          <div class="stat-label">임시 저장</div>
          <div class="stat-value" th:text="${stats.draftPostCount}">0</div>
          <div class="stat-change"
               th:classappend="${stats.draftPostCount > 0} ? '' : 'positive'"
               th:text="${stats.draftPostCount > 0} ? '처리 필요' : '없음'">-
          </div>
        </div>
        <div class="stat-icon">⏰</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-header">
        <div>
          <div class="stat-label">전체 방문자</div>
          <div class="stat-value"
               th:text="${#numbers.formatInteger(stats.totalVisitorCount, 1, 'COMMA')}">0
          </div>
          <div class="stat-change positive" th:text="'오늘 ' + ${stats.todayVisitorCount} + '명 ▲'">오늘
            0명
          </div>
        </div>
        <div class="stat-icon">📊</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-header">
        <div>
          <div class="stat-label">오늘 방문자</div>
          <div class="stat-value" th:text="${stats.todayVisitorCount}">0</div>
          <div class="stat-change">오늘 (IP 기준)</div>
        </div>
        <div class="stat-icon">👥</div>
      </div>
    </div>

  </div>
</main>
</body>
</html>
