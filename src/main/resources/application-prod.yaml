spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    # Syntax error가 보이면 build.gradle에 dependency 추가
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # SQL 출력 설정 (개발 시 유용)
    show-sql: false
    hibernate:
      # validate: 엔티티와 테이블이 정상 매핑되었는지만 확인 (운영 환경 권장)
      # update: 엔티티 변경사항을 자동 반영 (개발 환경에서만 사용)
      # create: 시작 시 테이블 삭제 후 재생성 (위험, 테스트용)
      # none: 아무것도 하지 않음
      ddl-auto: validate
    properties:
      hibernate:
        # SQL 포맷팅 (가독성 향상)
        format_sql: false
        # SQL 주석 출력 (어떤 엔티티에서 발생한 쿼리인지 표시)
        use_sql_comments: false
        # 데이터베이스 dialect 설정(hibernate-core에서 org.hibernate.dialect 패키지 확인)
        dialect: org.hibernate.dialect.H2Dialect

