<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layout/admin-layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <title>카테고리 관리</title>
  <style>
    /* 페이지 고유 스타일 */
    .category-container {
      max-width: 800px;
    }

    .form-row-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .edit-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .slug-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .drag-handle {
      cursor: grab;
      color: var(--text-secondary);
      padding: 0 8px;
      font-size: 16px;
      user-select: none;
      flex-shrink: 0;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .sortable-ghost {
      opacity: 0.4;
      background: var(--bg-secondary, #f0f0f0);
    }
  </style>
</head>
<body>
<main class="main-content" layout:fragment="content">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">카테고리 관리</h1>
      <p class="page-subtitle">게시글 분류를 위한 카테고리를 관리합니다</p>
    </div>
  </div>

  <!-- Category Management -->
  <div class="category-container">
    <div class="section-card">
      <div class="section-header">
        <div>
          <span class="section-title">카테고리</span>
          <span class="section-count" th:text="'(' + ${#lists.size(categories)} + '개)'">(0개)</span>
        </div>
      </div>

      <!-- Add Form -->
      <div class="add-form">
        <form id="addCategoryForm">
          <div class="form-row-2col">
            <div>
              <label for="newCategoryName"></label>
              <input
                  class="form-input"
                  id="newCategoryName"
                  placeholder="카테고리 이름 (예: Spring)"
                  required
                  type="text"
              >
            </div>
            <div>
              <label for="newCategorySlug"></label>
              <input
                  class="form-input slug-input"
                  id="newCategorySlug"
                  maxlength="250"
                  placeholder="Slug (예: spring)"
                  required
                  type="text"
              >
              <div class="slug-hint">영문 소문자, 숫자, 하이픈만 입력 가능</div>
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top: 12px;" type="submit">추가</button>
        </form>
      </div>

      <!-- Items List -->
      <div class="items-list" id="categoryList">
        <div class="item" th:data-id="${category.id}" th:each="category : ${categories}">
          <span class="drag-handle" title="드래그하여 순서 변경">⠿</span>
          <div class="item-info">
            <div class="item-name" th:text="${category.name}">Spring</div>
            <div class="item-meta">
              <span th:text="'Slug: ' + ${category.slug}">Slug: spring</span>
              <span style="margin-left: 12px;"
                    th:text="'게시글 ' + ${category.postCount} + '개'">게시글 12개</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit">수정</button>
            <button class="action-btn delete">삭제</button>
          </div>
          <div class="edit-form" style="display: none;">
            <input
                class="edit-input"
                th:data-pv="${category.name}"
                th:id="'edit-name-' + ${category.id}"
                th:value="${category.name}"
                type="text"
            >
            <input
                class="edit-input slug-input"
                th:data-pv="${category.slug}"
                th:id="'edit-slug-' + ${category.id}"
                th:value="${category.slug}"
                type="text"
            >
            <button class="btn btn-success action-btn save">저장</button>
            <button class="btn btn-cancel action-btn cancel">취소</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<!-- 페이지 JavaScript -->
<th:block layout:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script th:src="@{/js/admin/categories.js}" type="module"></script>
</th:block>
</body>
</html>
