<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layout/admin-layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title>게시글 작성</title>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        rel="stylesheet">
  <!-- EasyMDE -->
  <link rel="stylesheet" th:href="@{/js/lib/EasyMDE/css/easymde.min.css}">
  <style layout:fragment="styles">
    /* EasyMDE 다크모드 지원 */
    [data-theme="dark"] .EasyMDEContainer .CodeMirror {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .CodeMirror .editor-preview {
      background-color: var(--bg-card);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-toolbar {
      background-color: var(--bg-primary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-toolbar button {
      color: var(--text-primary);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-toolbar button:hover {
      background-color: var(--bg-secondary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-toolbar button.active {
      background-color: var(--bg-secondary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .editor-statusbar {
      background-color: var(--bg-primary);
      color: var(--text-secondary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .EasyMDEContainer .CodeMirror-cursor {
      border-left-color: var(--text-primary);
    }

    [data-theme="dark"] .EasyMDEContainer .CodeMirror-selected {
      background-color: #2A4A7F !important;
    }

    [data-theme="dark"] .EasyMDEContainer .CodeMirror-focused .CodeMirror-selected {
      background-color: #3A6BC4 !important;
    }

    [data-theme="dark"] .EasyMDEContainer .CodeMirror-line::selection,
    [data-theme="dark"] .EasyMDEContainer .CodeMirror-line > span::selection,
    [data-theme="dark"] .EasyMDEContainer .CodeMirror-line > span > span::selection {
      background-color: #3A6BC4;
    }

    [data-theme="dark"] .EasyMDEContainer .CodeMirror-line::-moz-selection,
    [data-theme="dark"] .EasyMDEContainer .CodeMirror-line > span::-moz-selection,
    [data-theme="dark"] .EasyMDEContainer .CodeMirror-line > span > span::-moz-selection {
      background-color: #3A6BC4;
    }

    /* 태그 입력 */
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-secondary);
      min-height: 45px;
      transition: all 0.2s;
    }

    .tags-container:focus-within {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    [data-theme="dark"] .tags-container:focus-within {
      box-shadow: 0 0 0 3px rgba(91, 159, 255, 0.1);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background-color: var(--color-primary);
      color: white;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .tag-remove {
      cursor: pointer;
      font-size: 14px;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .tag-remove:hover {
      opacity: 1;
    }

    .tag-input {
      flex: 1;
      min-width: 150px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      padding: 4px;
    }

    .tag-input:focus {
      outline: none;
    }

    /* 상태바 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-bar-left {
      display: flex;
      gap: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icon {
      font-size: 12px;
    }

    /* 라디오 버튼 그룹 */
    .radio-group {
      display: flex;
      gap: 16px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-primary);
    }

    .radio-label input[type="radio"] {
      cursor: pointer;
      accent-color: var(--color-primary);
    }

    /* 액션 버튼 */
    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      padding: 14px 32px;
      background-color: var(--bg-card);
      border-top: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
  </style>
</head>
<body>
<!-- Main Content -->
<main class="main-content" layout:fragment="content">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">게시글 작성</h1>
      <p class="page-subtitle">새로운 게시글을 작성하거나 기존 게시글을 수정합니다</p>
    </div>
  </div>

  <!-- Editor Form -->
  <div class="card">
    <div class="card-body">
      <form id="postForm">
        <!-- 제목 -->
        <div class="form-group">
          <label class="form-label" for="postTitle">제목 *</label>
          <input
              class="form-input"
              id="postTitle"
              placeholder="게시글 제목을 입력하세요"
              required
              th:value="${post != null ? post.title : ''}"
              type="text"
          >
        </div>

        <!-- 카테고리 -->
        <div class="form-group">
          <label class="form-label" for="postCategory">카테고리</label>
          <select class="form-select" id="postCategory">
            <option value="">카테고리를 선택하세요</option>
            <option th:each="category : ${categories}"
                    th:selected="${post != null and post.category != null and post.category.id == category.id}"
                    th:text="${category.name}"
                    th:value="${category.id}">
              Spring
            </option>
          </select>
        </div>

        <!-- Slug -->
        <div class="form-group">
          <label class="form-label" for="postSlug">
            Slug (URL) *
            <span style="font-size: 12px; color: var(--text-secondary); font-weight: normal;">- 영문, 숫자, 하이픈만 사용 (예: spring-security-jwt)</span>
          </label>
          <input
              class="form-input"
              id="postSlug"
              maxlength="250"
              placeholder="spring-security-jwt-authentication"
              required
              th:value="${post != null ? post.slug : ''}"
              type="text"
          >
          <div style="display: flex; justify-content: space-between; margin-top: 4px;">
            <small style="color: var(--text-secondary); font-size: 12px;">
              영문 소문자, 숫자, 하이픈(-)만 입력 가능
            </small>
            <small style="color: var(--text-secondary); font-size: 12px;">
              <span id="slugCount">0</span> /
              250자
            </small>
          </div>
        </div>

        <!-- 태그 -->
        <div class="form-group">
          <label class="form-label" for="tagInput">태그</label>
          <div class="tags-container" id="tagsContainer">
            <th:block th:if="${post != null and #lists.size(post.tags) > 0}">
              <span class="tag"
                    th:data-id="${tag.id}"
                    th:data-index="${stat.index}"
                    th:each="tag, stat : ${post.tags}"
                    th:text="${tag.name}">Spring Security</span>
            </th:block>

            <input
                class="tag-input"
                id="tagInput"
                placeholder="태그를 입력하고 Enter 또는 쉼표를 입력하세요"
                type="text"
            >
          </div>
        </div>

        <!-- 요약 -->
        <div class="form-group">
          <label class="form-label" for="postSummary">
            요약
            <span style="font-size: 12px; color: var(--text-secondary); font-weight: normal;">- 검색 결과 및 카드에 표시됩니다</span>
          </label>
          <textarea
              class="form-textarea"
              id="postSummary"
              maxlength="500"
              placeholder="게시글 요약을 입력하세요 (최대 500자)"
              rows="3"
              th:text="${post != null ? post.summary : ''}"></textarea>
          <div style="text-align: right; margin-top: 4px;">
            <small style="color: var(--text-secondary); font-size: 12px;">
              <span id="summaryCount">0</span> / 500자
            </small>
          </div>
        </div>

        <!-- 마크다운 에디터 -->
        <div class="form-group">
          <label class="form-label" for="markdownEditor">내용 *</label>
          <textarea id="markdownEditor" th:text="${post != null ? post.content : ''}"></textarea>
        </div>

        <!-- 게시 상태 -->
        <div class="form-group">
          <label class="form-label">게시 상태</label>
          <div class="radio-group">
            <label class="radio-label" for="status-published">
              <input id="status-published" name="status"
                     th:checked="${post != null and #strings.equalsIgnoreCase(post.status, 'PUBLISHED')}"
                     type="radio"
                     value="published">
              <span>게시</span>
            </label>
            <label class="radio-label" for="status-draft">
              <input id="status-draft" name="status"
                     th:checked="${post == null or #strings.equalsIgnoreCase(post.status, 'DRAFT')}"
                     type="radio"
                     value="draft">
              <span>임시 저장</span>
            </label>
          </div>
        </div>

        <!-- 상태바 -->
        <div class="status-bar" style="margin-bottom: 24px;">
          <div class="status-bar-left">
            <div class="status-item">
              <span class="status-icon">📄</span>
              <span id="lineCount">0줄</span>
            </div>
            <div class="status-item">
              <span class="status-icon">📝</span>
              <span id="wordCount">0자</span>
            </div>
          </div>
        </div>

        <!-- 고정 버튼 바 높이만큼 하단 여백 -->
        <div style="height: 64px;"></div>

        <!-- 액션 버튼 -->
        <div class="form-actions">
          <button class="btn btn-secondary" id="cancelBtn" type="button">취소</button>
          <button class="btn btn-primary" type="submit">게시하기</button>
        </div>
      </form>
    </div>
  </div>
</main>
<th:block layout:fragment="scripts">
  <!-- EasyMDE -->
  <script th:src="@{/js/lib/EasyMDE/easymde.min.js}"></script>
  <!-- 페이지 JavaScript -->
  <script th:src="@{/js/admin/post-form.js}" type="module"></script>
</th:block>
</body>
</html>
