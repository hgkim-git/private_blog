[DEFAULT]
# 자기 차단 방지 — 본인 공인 IP 반드시 추가
ignoreip = 127.0.0.1/8 ::1 <본인_공인IP>

[nginx-login-bruteforce]
enabled  = true
filter   = nginx-login-bruteforce
logpath  = /var/log/nginx/hgkimer.me.access.log
maxretry = 5
findtime = 60
bantime  = 3600

[nginx-bad-uri]
enabled  = true
filter   = nginx-bad-uri
logpath  = /var/log/nginx/hgkimer.me.access.log
maxretry = 3
findtime = 60
bantime  = 86400
