<!DOCTYPE html>
<html lang="ko" layout:decorate="layout/admin-layout"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <title>카테고리 관리</title>
  <style>
    /* 페이지 고유 스타일 */
    .category-container {
      max-width: 800px;
    }

    .form-row-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .edit-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .slug-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
  </style>
</head>
<body>
<main class="main-content" layout:fragment="content">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">카테고리 관리</h1>
      <p class="page-subtitle">게시글 분류를 위한 카테고리를 관리합니다</p>
    </div>
  </div>

  <!-- Category Management -->
  <div class="category-container">
    <div class="section-card">
      <div class="section-header">
        <div>
          <span class="section-title">카테고리</span>
          <span class="section-count" id="categoryCount">(5개)</span>
        </div>
      </div>

      <!-- Add Form -->
      <div class="add-form">
        <form id="addCategoryForm">
          <div class="form-row-2col">
            <div>
              <input
                  type="text"
                  class="form-input"
                  id="newCategoryName"
                  placeholder="카테고리 이름 (예: Spring)"
                  required
              >
            </div>
            <div>
              <input
                  type="text"
                  class="form-input"
                  id="newCategorySlug"
                  placeholder="Slug (예: spring)"
                  maxlength="250"
                  pattern="[a-z0-9-]+"
                  required
              >
              <div class="slug-hint">영문 소문자, 숫자, 하이픈만 입력 가능</div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: 12px;">추가</button>
        </form>
      </div>

      <!-- Items List -->
      <div class="items-list" id="categoryList">
        <div class="item" data-id="1">
          <div class="item-info">
            <div class="item-name">Spring</div>
            <div class="item-meta">
              <span>Slug: spring</span>
              <span style="margin-left: 12px;">게시글 12개</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit" onclick="editCategory(1)">수정</button>
            <button class="action-btn delete" onclick="deleteCategory(1)">삭제</button>
          </div>
        </div>

        <div class="item" data-id="2">
          <div class="item-info">
            <div class="item-name">Java</div>
            <div class="item-meta">
              <span>Slug: java</span>
              <span style="margin-left: 12px;">게시글 8개</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit" onclick="editCategory(2)">수정</button>
            <button class="action-btn delete" onclick="deleteCategory(2)">삭제</button>
          </div>
        </div>

        <div class="item" data-id="3">
          <div class="item-info">
            <div class="item-name">Database</div>
            <div class="item-meta">
              <span>Slug: database</span>
              <span style="margin-left: 12px;">게시글 5개</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit" onclick="editCategory(3)">수정</button>
            <button class="action-btn delete" onclick="deleteCategory(3)">삭제</button>
          </div>
        </div>

        <div class="item" data-id="4">
          <div class="item-info">
            <div class="item-name">DevOps</div>
            <div class="item-meta">
              <span>Slug: devops</span>
              <span style="margin-left: 12px;">게시글 3개</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit" onclick="editCategory(4)">수정</button>
            <button class="action-btn delete" onclick="deleteCategory(4)">삭제</button>
          </div>
        </div>

        <div class="item" data-id="5">
          <div class="item-info">
            <div class="item-name">Frontend</div>
            <div class="item-meta">
              <span>Slug: frontend</span>
              <span style="margin-left: 12px;">게시글 2개</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit" onclick="editCategory(5)">수정</button>
            <button class="action-btn delete" onclick="deleteCategory(5)">삭제</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<!-- 페이지 JavaScript -->
<script layout:fragment="scripts">
  // Slug 자동 생성
  const newCategoryName = document.getElementById('newCategoryName');
  const newCategorySlug = document.getElementById('newCategorySlug');

  newCategoryName.addEventListener('input', (e) => {
    if (!newCategorySlug.value) {
      newCategorySlug.value = generateSlug(e.target.value);
    }
  });

  newCategorySlug.addEventListener('input', (e) => {
    e.target.value = e.target.value
    .toLowerCase()
    .replace(/[^a-z0-9-]/g, '')
    .replace(/--+/g, '-')
    .replace(/^-|-$/g, '');
  });

  // Slug 생성 함수
  function generateSlug(text) {
    return text
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .substring(0, 250);
  }

  // 카테고리 추가
  document.getElementById('addCategoryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = newCategoryName.value.trim();
    const slug = newCategorySlug.value.trim();

    if (name && slug) {
      console.log('카테고리 추가:', {name, slug});
      alert(`카테고리 "${name}" (${slug})가 추가되었습니다.`);
      newCategoryName.value = '';
      newCategorySlug.value = '';
    }
  });

  // 카테고리 수정
  function editCategory(id) {
    const item = document.querySelector(`.item[data-id="${id}"]`);
    const nameEl = item.querySelector('.item-name');
    const metaEl = item.querySelector('.item-meta');
    const actionsEl = item.querySelector('.item-actions');

    const currentName = nameEl.textContent;
    const currentSlug = metaEl.textContent.match(/Slug: ([^\s]+)/)[1];

    item.classList.add('editing');

    const editForm = document.createElement('div');
    editForm.className = 'edit-form';
    editForm.innerHTML = `
                <input 
                    type="text" 
                    class="edit-input" 
                    id="editName${id}"
                    value="${currentName}"
                >
                <input 
                    type="text" 
                    class="edit-input" 
                    id="editSlug${id}"
                    value="${currentSlug}"
                    pattern="[a-z0-9-]+"
                >
                <button class="btn btn-success" onclick="saveCategory(${id})">저장</button>
                <button class="btn btn-cancel" onclick="cancelEdit(${id})">취소</button>
            `;

    item.querySelector('.item-info').style.display = 'none';
    actionsEl.style.display = 'none';
    item.insertBefore(editForm, actionsEl);

    // Slug 입력 검증
    document.getElementById(`editSlug${id}`).addEventListener('input', (e) => {
      e.target.value = e.target.value
      .toLowerCase()
      .replace(/[^a-z0-9-]/g, '')
      .replace(/--+/g, '-');
    });
  }

  // 저장
  function saveCategory(id) {
    const name = document.getElementById(`editName${id}`).value.trim();
    const slug = document.getElementById(`editSlug${id}`).value.trim();

    if (!name || !slug) {
      alert('이름과 Slug를 모두 입력해주세요.');
      return;
    }

    if (!/^[a-z0-9-]+$/.test(slug)) {
      alert('Slug는 영문 소문자, 숫자, 하이픈만 사용할 수 있습니다.');
      return;
    }

    console.log('카테고리 수정:', {id, name, slug});
    alert(`카테고리가 "${name}" (${slug})로 수정되었습니다.`);
    location.reload();
  }

  // 취소
  function cancelEdit(id) {
    location.reload();
  }

  // 삭제
  function deleteCategory(id) {
    if (confirm('이 카테고리를 삭제하시겠습니까?\n카테고리에 속한 게시글은 "미분류"로 변경됩니다.')) {
      console.log('카테고리 삭제:', id);
      alert('카테고리가 삭제되었습니다.');
    }
  }

  // Window에 함수 노출
  window.editCategory = editCategory;
  window.saveCategory = saveCategory;
  window.cancelEdit = cancelEdit;
  window.deleteCategory = deleteCategory;
</script>
</body>
</html>
