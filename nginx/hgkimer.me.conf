server {
    server_name hgkimer.me www.hgkimer.me;

    access_log /var/log/nginx/hgkimer.me.access.log combined;
    error_log  /var/log/nginx/hgkimer.me.error.log warn;

    # gzip 압축 (응답 크기 절감)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    if ($bad_word) {
       return 444;
    }

    # 로그인 경로 rate limiting (brute-force 방어)
    location = /api/auth/login {
        limit_req zone=login_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_cookie_flags ~ secure samesite=strict;
    }

    location = /admin/login {
        limit_req zone=login_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_cookie_flags ~ secure samesite=strict;
    }

    location = / {
      return 301 /posts;
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_cookie_flags ~ secure samesite=strict;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hgkimer.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hgkimer.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.hgkimer.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = hgkimer.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name hgkimer.me www.hgkimer.me;
    return 404; # managed by Certbot




}