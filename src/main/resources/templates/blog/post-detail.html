<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layout/blog-layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${post.title}">제목</title>
</head>
<body>
<!-- Main Layout -->
<div class="blog-container" layout:fragment="content">
  <div class="main-layout">
    <!-- TOC Sidebar -->
    <aside class="toc-sidebar">
      <a class="back-to-list" th:href="@{/}">← 목록으로</a>
      <h3 class="toc-title">목차</h3>
      <ul class="toc-list" th:utext="${tocHtml}"></ul>
    </aside>

    <!-- Main Content -->
    <main class="blog-main">
      <article class="post-detail">
        <!-- Post Header -->
        <div class="post-header">
          <h1 class="post-detail-title" th:text="${post.title}">
            Spring Security와 JWT를 활용한 인증 시스템 구현
          </h1>
          <div class="post-detail-meta">
            <span class="post-category" th:text="${post.category.name}"
                  th:unless="${post.category == null}">Spring</span>
            <span class="post-date"
                  th:text="${'📅 ' + #temporals.format(post.createdAt, 'yyyy.MM.dd')}">📅 2024.01.15</span>
            <span class="stat-item" th:text="${'👁️ ' + post.viewCount}">👁️ 1,234</span>
            <!--<span class="stat-item">💬 12</span>-->
          </div>
          <div class="post-tags">
            <span class="tag" th:each="tag : ${post.tags}"
                  th:text="${tag.name}">Spring Security</span>
          </div>
        </div>
        <!-- Post Content -->
        <div class="post-content" th:utext="${post.content}"></div>
      </article>

      <!-- Comments Section -->

                  placeholder="이메일"
                  required
              >
            </div>
            <textarea
                class="comment-textarea"
                placeholder="댓글을 입력하세요..."

            ></textarea>
            <button type="submit" class="submit-btn">댓글 작성</button>
          </form>
        </div>

        &lt;!&ndash; Comments List &ndash;&gt;

    </main>
  </div>
</div>
</body>
