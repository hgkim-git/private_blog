spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    # Syntax error가 보이면 build.gradle에 dependency 추가
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # validate: 엔티티와 테이블이 정상 매핑되었는지만 확인 (운영 환경 권장)
      # update: 엔티티 변경사항을 자동 반영 (개발 환경에서만 사용)
      # create: 시작 시 테이블 삭제 후 재생성 (위험, 테스트용)
      # none: 아무것도 하지 않음
      ddl-auto: validate

# Logging (파일 출력 + 롤링)
logging:
  level:
    root: INFO
    io.github.hgkimer.privateblog: INFO
    p6spy: OFF
  file:
    name: ./logs/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{50} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

jwt:
  secret-key: ${JWT_SECRET_KEY} # prod 에선 환경 변수 처리 필요
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION} # access token 만료 시간(ms) 관리자 페이지라 혼자만 로그인하니까 하루로 잡음
  cookie-name: ${JWT_COOKIE_NAME}
  use-secure-cookie: false # http: false / https: true


# p6spy 비활성화 (prod 환경)
decorator:
  datasource:
    p6spy:
      enable-logging: false