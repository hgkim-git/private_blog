<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>로그인 - Dev Blog</title>
  <!-- 공통 CSS -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <!-- 로그인 CSS -->
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <link rel="icon" th:href="@{/img/favicon.ico}">
</head>
<body>
<button class="theme-toggle" id="themeToggle">
  <span id="themeIcon">🌙</span>
</button>
<div class="login-container">
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">🔐</div>
      <h1 class="login-title">로그인</h1>
      <p class="login-subtitle">관리자 계정으로 로그인하세요</p>
    </div>

    <th:block th:if="${logoutMessage != null}">
      <!-- Success Message (로그아웃 성공) -->
      <div class="success-message" id="logout-message">
        <span th:text="${logoutMessage}"></span>
      </div>
    </th:block>

    <!-- Login Form -->
    <form class="login-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">아이디</label>
        <input
            autofocus
            class="form-input"
            id="username"
            name="username"
            placeholder="아이디를 입력하세요"
            required
            type="text"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <div class="password-wrapper">
          <input
              class="form-input"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요"
              required
              type="password"
          >
          <button class="password-toggle" id="toggle-password" type="button">
            👁️
          </button>
        </div>
      </div>

      <!--<div class="form-options">
          <label class="remember-me">
              <input type="checkbox" name="remember-me" id="remember">
              <span>로그인 상태 유지</span>
          </label>
      </div>-->

      <button class="login-button" type="submit">
        로그인
      </button>
    </form>

    <!-- Divider -->
    <!--<div class="divider">또는</div>-->

    <!-- Social Login (OAuth2) -->
    <!--<div class="social-login">
        <a th:href="@{/oauth2/authorization/google}" class="social-button">
            <span class="social-icon">🔵</span>
            Google로 로그인
        </a>
        <a th:href="@{/oauth2/authorization/github}" class="social-button">
            <span class="social-icon">⚫</span>
            GitHub로 로그인
        </a>
    </div>-->

    <!-- Signup Link -->
    <!--<div class="signup-link">
        계정이 없으신가요? <a th:href="@{/signup}">회원가입</a>
    </div>-->
  </div>

  <!-- Back to Home -->
  <div class="back-to-home">
    <a class="back-link" th:href="@{/}">
      ← 블로그 홈으로 돌아가기
    </a>
  </div>
</div>

<script th:src="@{/js/common.js}" type="module"></script>
<script th:src="@{/js/login.js}" type="module"></script>
</body>
</html>
