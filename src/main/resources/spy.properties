# p6spy 설정
# SQL 로깅 포맷
zzlogMessageFormat=io.github.hgkimer.blog.config.P6spySqlFormatter
# 실행 시간 임계값 (ms) - 이 시간 이상 걸리는 쿼리만 로깅 (0 = 모든 쿼리)
executionThreshold=0
# 바인딩 파라미터를 실제 값으로 치환하여 출력
databaseDialectDateFormat=yyyy-MM-dd HH:mm:ss
# 스택 트레이스 제외 (불필요한 로그 감소)
excludecategories=info,debug,result,resultset,batch
# 커넥션 ID 제외
excludebinary=true

